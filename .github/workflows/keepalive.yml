name: Keep Hugging Face Spaces Alive

on:
  schedule:
    # 每天 UTC 02:00，北京时间 10:00 执行一次
    # HF 免费 Space 通常 48 小时无访问才休眠，每天 GET 一次最稳
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HF Spaces
        run: |
          curl -L --max-time 30 --retry 3 --retry-delay 5 "https://aiasmin-openai-cpa.hf.space" || true
          curl -L --max-time 30 --retry 3 --retry-delay 5 "https://aiasmin-chatgpt2api.hf.space" || true
          curl -L --max-time 30 --retry 3 --retry-delay 5 "https://aiasmn-openai-cpa.hf.space" || true
          curl -L --max-time 30 --retry 3 --retry-delay 5 "https://aiasmn-chatgpt2api.hf.space" || true
          curl -L --max-time 30 --retry 3 --retry-delay 5 "https://aiasmins-moontvplus.hf.space" || true
